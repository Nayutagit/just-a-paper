<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINOT STORE Time Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="staff.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="clock-container">
        <header class="header">
            <h1>PINOT STORE</h1>
            <!-- <p>Staff Attendance</p> -->
            <div id="workingStatus" class="status-board">
                <!-- Active staff icons will appear here -->
            </div>
        </header>

        <div class="current-time" id="clock">--:--:--</div>
        <div class="current-date" id="date">----/--/--</div>

        <div class="staff-selector">
            <label for="staffName">Staff Name</label>
            <select id="staffName">
                <option value="" disabled selected>名前を選択してください</option>
                <option value="なゆた">なゆた</option>
                <option value="よういちろう">よういちろう</option>
                <option value="まなみん">まなみん</option>
                <option value="あき">あき</option>
                <option value="はやと">はやと</option>
                <option value="ひとみ">ひとみ</option>
                <option value="ケンケン">ケンケン</option>
                <option value="りゅうくん">りゅうくん</option>
                <option value="まみ">まみ</option>
            </select>
        </div>

        <div class="action-grid" style="grid-template-columns: 1fr 1fr;">
            <button class="action-btn in" onclick="recordTime('出勤')">
                <span class="icon">☀️</span>
                <span class="label">出勤</span>
                <span class="sub">Clock In</span>
            </button>
            <button class="action-btn out" onclick="recordTime('退勤')">
                <span class="icon">🌙</span>
                <span class="label">退勤</span>
                <span class="sub">Clock Out</span>
            </button>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <div class="settings-area">
            <details>
                <summary>Manager Menu (管理者メニュー)</summary>
                <div class="input-group">
                    <button onclick="showMonthlyReport()" class="save-btn" style="background: #8e44ad;">Monthly Report
                        (月間集計)</button>
                    <button onclick="downloadCSV()" class="save-btn"
                        style="background: #27ae60; margin-top:10px;">Download CSV (Excel)</button>
                    <button onclick="openEditor()" class="save-btn" style="background: #2980b9; margin-top:10px;">Edit
                        Records (修正・管理)</button>
                </div>
            </details>
        </div>
    </div>

    <!-- Monthly Report Modal -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>月間勤務集計</h2>
                <button onclick="closeReport()" style="background:none; border:none; font-size:1.5rem;">&times;</button>
            </div>
            <div class="input-group" style="flex-direction:row; align-items:center; margin-bottom:15px;">
                <input type="month" id="reportMonth" onchange="renderReport()" style="font-size:1rem;">
            </div>
            <div id="reportContainer" class="editor-container">
                <!-- Report will be injected here -->
            </div>
        </div>
    </div>

    <!-- Editor Modal -->
    <div id="editorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>勤怠管理・修正</h2>
                <button onclick="closeEditor()" style="background:none; border:none; font-size:1.5rem;">&times;</button>
            </div>

            <div style="margin-bottom: 10px;">
                <button onclick="addNewRow()" class="save-btn"
                    style="background: #e67e22; width:auto; padding: 5px 15px;">＋ 新規追加 (Add New)</button>
            </div>

            <div id="editorList" class="editor-container">
                <!-- Rows will be injected here -->
            </div>

            <div style="display:flex; justify-content: flex-end; gap: 10px;">
                <button onclick="closeEditor()" class="btn-close">Cancel</button>
                <button onclick="saveAllChanges()" class="btn-save">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const SUPABASE_URL = 'https://xoqdhhpvzaseooohpeid.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xIS-gPvdyqGZx8nc71muUQ_aD6UxrWa';

        let sb; // Renamed to 'sb' to avoid conflict with global 'supabase'
        try {
            sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error("Supabase Init Error:", e);
        }

        // Clock Update
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP');
            document.getElementById('date').textContent = now.toLocaleDateString('ja-JP', { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            fetchStatusBoard(); // Initial fetch
            subscribeToChanges(); // Listen for realtime updates

            // Set default month for report
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            document.getElementById('reportMonth').value = `${yyyy}-${mm}`;
        });

        // --- Core Logic (Supabase) ---

        // Record Time Function
        async function recordTime(action) {
            const staffName = document.getElementById('staffName').value;
            const statusDiv = document.getElementById('statusMessage');

            if (!staffName) {
                statusDiv.textContent = '❌ 名前を選択してください';
                statusDiv.className = 'status-message error';
                return;
            }

            statusDiv.textContent = '⏳ 送信中...';
            statusDiv.className = 'status-message sending';

            const now = new Date();
            const record = {
                // created_at is auto
                timestamp: now.toISOString(),
                date: now.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-'), // YYYY-MM-DD
                time: now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }), // HH:MM
                staff: staffName,
                action: action
            };

            const { data, error } = await sb
                .from('attendance')
                .insert([record])
                .select();

            if (error) {
                console.error("Insert Error:", error);
                statusDiv.innerHTML = `❌ エラーが発生しました: <br>${error.message}`;
                statusDiv.className = 'status-message error';
            } else {
                const emoji = action === '出勤' ? '☀️' : '🌙';
                statusDiv.innerHTML = `✅ <strong>${record.time}</strong><br>${staffName}: ${action} 完了しました ${emoji}`;
                statusDiv.className = 'status-message success';
                // Note: Status board will update automatically via subscription
            }
        }

        // --- Realtime & Status Board ---

        // Subscribe to database changes
        function subscribeToChanges() {
            sb
                .channel('attendance_changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'attendance' }, payload => {
                    console.log('Change received!', payload);
                    fetchStatusBoard(); // Refresh board on any change
                })
                .subscribe();
        }

        // Fetch data to calculate current status
        async function fetchStatusBoard() {
            const { data, error } = await sb
                .from('attendance')
                .select('*')
                .order('id', { ascending: false })
                .limit(200); // Fetch last 200 checks

            if (error) {
                console.error("Fetch Error:", error);
                return;
            }

            // Logic: Process from oldest to newest to determine state
            // But we fetched newest first. Let's reverse for processing.
            const records = data.reverse();
            const statusMap = {};

            records.forEach(row => {
                if (row.action === '出勤') statusMap[row.staff] = 'in';
                if (row.action === '退勤') statusMap[row.staff] = 'out';
            });

            renderStatusBoard(statusMap);
        }

        function renderStatusBoard(statusMap) {
            const board = document.getElementById('workingStatus');
            board.innerHTML = '';

            let activeCount = 0;
            const staffs = ["なゆた", "よういちろう", "まなみん", "あき", "はやと", "ひとみ", "ケンケン", "りゅうくん", "まみ"];

            staffs.forEach(staff => {
                if (statusMap[staff] === 'in') {
                    const badge = document.createElement('span');
                    badge.className = 'status-badge in';
                    badge.textContent = staff;
                    board.appendChild(badge);
                    activeCount++;
                }
            });

            if (activeCount === 0) {
                board.innerHTML = '<span class="status-placeholder">誰も出勤していません</span>';
            }
        }

        // --- Reporting Logic ---

        function showMonthlyReport() {
            document.getElementById('reportModal').classList.add('active');
            renderReport();
        }

        function closeReport() {
            document.getElementById('reportModal').classList.remove('active');
        }

        async function renderReport() {
            const monthInput = document.getElementById('reportMonth').value; // YYYY-MM
            if (!monthInput) return;

            const container = document.getElementById('reportContainer');
            container.innerHTML = '<p style="text-align:center;">読み込み中...</p>';

            // Fetch records for the selected month
            // format: date starts with YYYY-MM
            const { data, error } = await sb
                .from('attendance')
                .select('*')
                .like('date', `${monthInput}%`)
                .order('date', { ascending: true })
                .order('time', { ascending: true });

            if (error) {
                container.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
                return;
            }

            // Group by Staff
            const staffRecords = {};
            data.forEach(row => {
                if (!staffRecords[row.staff]) staffRecords[row.staff] = [];
                staffRecords[row.staff].push(row);
            });

            // Calculate Totals
            let html = '<table class="report-table"><thead><tr><th>Name</th><th>Total Hours</th></tr></thead><tbody>';
            let hasData = false;

            for (const staff of Object.keys(staffRecords)) {
                const records = staffRecords[staff];
                const totalMinutes = calculateMinutes(records);
                const hours = Math.floor(totalMinutes / 60);
                const minutes = totalMinutes % 60;

                html += `
                    <tr>
                        <td><strong>${staff}</strong></td>
                        <td>${hours}時間 ${minutes}分</td>
                    </tr>
                `;
                hasData = true;
            }

            html += '</tbody></table>';

            if (!hasData) {
                container.innerHTML = '<p style="text-align:center; padding:20px;">データがありません</p>';
            } else {
                container.innerHTML = html;
            }
        }

        function calculateMinutes(records) {
            let totalMinutes = 0;
            let lastInTime = null;

            records.forEach(row => {
                let dt;
                dt = new Date(`${row.date.replace(/-/g, '/')} ${row.time}`);

                if (row.action === '出勤') {
                    lastInTime = dt;
                } else if (row.action === '退勤') {
                    if (lastInTime) {
                        const diff = (dt - lastInTime) / 1000 / 60; // minutes
                        if (diff > 0) totalMinutes += diff;
                        lastInTime = null; // Reset
                    }
                }
            });

            return Math.floor(totalMinutes);
        }

        // --- Manager / Editor Logic ---

        async function downloadCSV() {
            const { data, error } = await sb
                .from('attendance')
                .select('*')
                .order('date', { ascending: true })
                .order('time', { ascending: true });

            if (error) { alert('DB Error: ' + error.message); return; }
            if (data.length === 0) { alert('データがありません'); return; }

            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Date,Time,Staff,Action\n";

            data.forEach(row => {
                const dateFixed = row.date.replace(/-/g, '/');
                csvContent += `${dateFixed},${row.time},${row.staff},${row.action}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            const dateStr = new Date().toISOString().slice(0, 10);
            link.setAttribute("download", `pinot_attendance_cloud_${dateStr}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        let editingData = [];

        async function openEditor() {
            document.getElementById('editorModal').classList.add('active');
            renderEditorLoading();

            const { data, error } = await sb
                .from('attendance')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(100);

            if (error) {
                alert("Error fetching data: " + error.message);
                return;
            }

            editingData = data;
            renderEditor();
        }

        function closeEditor() {
            document.getElementById('editorModal').classList.remove('active');
        }

        function renderEditorLoading() {
            document.getElementById('editorList').innerHTML = '<p style="text-align:center; padding:20px;">読み込み中...</p>';
        }

        function renderEditor() {
            const container = document.getElementById('editorList');
            container.innerHTML = '';

            editingData.forEach((row, index) => {
                const div = document.createElement('div');
                div.className = 'edit-row';
                const dateValue = row.date.replace(/\//g, '-');

                const isNew = !row.id;
                div.style.backgroundColor = isNew ? '#fff9c4' : 'transparent';

                div.innerHTML = `
                    <input type="date" class="edit-date" value="${dateValue}" onchange="updateRow(${index}, 'date', this.value)">
                    <input type="time" class="edit-time" value="${row.time}" onchange="updateRow(${index}, 'time', this.value)">
                    <select class="edit-staff" onchange="updateRow(${index}, 'staff', this.value)">
                        ${getStaffOptions(row.staff)}
                    </select>
                    <select class="edit-action" onchange="updateRow(${index}, 'action', this.value)">
                        <option value="出勤" ${row.action === '出勤' ? 'selected' : ''}>出勤</option>
                        <option value="退勤" ${row.action === '退勤' ? 'selected' : ''}>退勤</option>
                    </select>
                    <button class="btn-delete" onclick="deleteRow(${index})">🗑</button>
                    <!-- Track changes -->
                    <input type="hidden" id="changed_${index}" value="false">
                `;
                container.appendChild(div);
            });
        }

        function addNewRow() {
            const now = new Date();
            const newRow = {
                id: null,
                date: now.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-'),
                time: now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }),
                staff: 'なゆた',
                action: '出勤',
                _isChanged: true
            };
            editingData.unshift(newRow); // Add to top
            renderEditor();
        }

        function getStaffOptions(selectedName) {
            const staffs = ["なゆた", "よういちろう", "まなみん", "あき", "はやと", "ひとみ", "ケンケン", "りゅうくん", "まみ"];
            return staffs.map(name =>
                `<option value="${name}" ${name === selectedName ? 'selected' : ''}>${name}</option>`
            ).join('');
        }

        function updateRow(index, field, value) {
            editingData[index][field] = value;
            editingData[index]._isChanged = true;
        }

        async function deleteRow(index) {
            if (!confirm('本当に削除しますか？\n（この操作は取り消せません）')) return;

            const record = editingData[index];

            if (record.id) {
                const { error } = await sb
                    .from('attendance')
                    .delete()
                    .eq('id', record.id);

                if (error) {
                    alert("削除エラー: " + error.message);
                    return;
                }
            }

            editingData.splice(index, 1);
            renderEditor();
        }

        async function saveAllChanges() {
            const changedRecords = editingData.filter(r => r._isChanged);

            if (changedRecords.length === 0) {
                alert('変更点はありません');
                return;
            }

            let errorCount = 0;

            for (const r of changedRecords) {
                let error = null;

                if (r.id) {
                    const { error: updateError } = await sb
                        .from('attendance')
                        .update({
                            date: r.date,
                            time: r.time,
                            staff: r.staff,
                            action: r.action
                        })
                        .eq('id', r.id);
                    error = updateError;
                } else {
                    const { error: insertError } = await sb
                        .from('attendance')
                        .insert([{
                            date: r.date,
                            time: r.time,
                            staff: r.staff,
                            action: r.action
                        }]);
                    error = insertError;
                }

                if (error) {
                    console.error("Save failed for", r, error);
                    errorCount++;
                } else {
                    r._isChanged = false;
                }
            }

            if (errorCount > 0) {
                alert(`${errorCount}件の保存に失敗しました。`);
            } else {
                alert('修正・追加を保存しました！');
                closeEditor();
                fetchStatusBoard();
            }
        }
    </script>
</body>

</html>
