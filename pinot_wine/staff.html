<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinot Staff Time Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="staff.css">
</head>

<body>

    <div class="clock-container">
        <header class="header">
            <h1>PINOT WINE</h1>
            <p>Staff Attendance</p>
        </header>

        <div class="current-time" id="clock">--:--:--</div>
        <div class="current-date" id="date">----/--/--</div>

        <div class="staff-selector">
            <label for="staffName">Staff Name</label>
            <select id="staffName">
                <option value="" disabled selected>名前を選択してください</option>
                <option value="なゆた">なゆた</option>
                <option value="よういちろう">よういちろう</option>
                <option value="まなみん">まなみん</option>
                <option value="あき">あき</option>
                <option value="はやと">はやと</option>
                <option value="ひとみ">ひとみ</option>
                <option value="ケンケン">ケンケン</option>
                <option value="りゅうくん">りゅうくん</option>
            </select>
        </div>

        <div class="action-grid">
            <button class="action-btn in" onclick="recordTime('出勤')">
                <span class="icon">☀️</span>
                <span class="label">出勤</span>
                <span class="sub">Clock In</span>
            </button>
            <button class="action-btn out" onclick="recordTime('退勤')">
                <span class="icon">🌙</span>
                <span class="label">退勤</span>
                <span class="sub">Clock Out</span>
            </button>
            <button class="action-btn break" onclick="recordTime('休憩入')">
                <span class="icon">☕️</span>
                <span class="label">休憩入り</span>
            </button>
            <button class="action-btn break" onclick="recordTime('休憩戻')">
                <span class="icon">🔙</span>
                <span class="label">休憩戻り</span>
            </button>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <div class="settings-area">
            <details>
                <summary>Manager Menu (管理者メニュー)</summary>
                <div class="input-group">
                    <button onclick="downloadCSV()" class="save-btn" style="background: #27ae60;">Download CSV
                        (Excel)</button>
                    <button onclick="showHistory()" class="save-btn" style="background: #2c3e50; margin-top:10px;">View
                        History (履歴表示)</button>
                    <button onclick="clearData()" class="save-btn" style="background: #c0392b; margin-top:10px;">Clear
                        Data (全消去)</button>
                </div>
                <div id="historyArea" style="margin-top:20px; font-size:0.8rem; display:none;">
                    <ul id="historyList" style="list-style:none; text-align:left;"></ul>
                </div>
            </details>
        </div>
    </div>

    <script>
        // Clock Update
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP');
            document.getElementById('date').textContent = now.toLocaleDateString('ja-JP', { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Record Time Function (Local Storage)
        function recordTime(action) {
            const staffName = document.getElementById('staffName').value;
            const statusDiv = document.getElementById('statusMessage');

            if (!staffName) {
                statusDiv.textContent = '❌ 名前を選択してください';
                statusDiv.className = 'status-message error';
                return;
            }

            const now = new Date();
            const record = {
                id: Date.now(), // unique ID
                timestamp: now.toISOString(),
                date: now.toLocaleDateString('ja-JP'),
                time: now.toLocaleTimeString('ja-JP'),
                staff: staffName,
                action: action
            };

            // Save to LocalStorage
            let data = JSON.parse(localStorage.getItem('pinot_attendance_v1') || '[]');
            data.push(record);
            localStorage.setItem('pinot_attendance_v1', JSON.stringify(data));

            // Feedback
            statusDiv.innerHTML = `✅ <strong>${record.time}</strong><br>${staffName}: ${action} 記録しました`;
            statusDiv.className = 'status-message success';
        }

        // Export to CSV
        function downloadCSV() {
            const data = JSON.parse(localStorage.getItem('pinot_attendance_v1') || '[]');
            if (data.length === 0) {
                alert('データがありません');
                return;
            }

            // CSV Header
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Date,Time,Staff,Action\n";

            // CSV Body
            data.forEach(row => {
                csvContent += `${row.date},${row.time},${row.staff},${row.action}\n`;
            });

            // Download Link
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            const dateStr = new Date().toISOString().slice(0, 10);
            link.setAttribute("download", `pinot_attendance_${dateStr}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Show History
        function showHistory() {
            const list = document.getElementById('historyList');
            const area = document.getElementById('historyArea');
            const data = JSON.parse(localStorage.getItem('pinot_attendance_v1') || '[]');

            list.innerHTML = '';
            // Show last 10 records
            data.slice().reverse().slice(0, 10).forEach(row => {
                const li = document.createElement('li');
                li.style.borderBottom = '1px solid #eee';
                li.style.padding = '4px 0';
                li.textContent = `${row.date} ${row.time} - ${row.staff} (${row.action})`;
                list.appendChild(li);
            });
            area.style.display = 'block';
        }

        // Clear Data
        function clearData() {
            if (confirm('全てのデータを消去しますか？\n(CSVバックアップを取ってから行うことを推奨します)')) {
                localStorage.removeItem('pinot_attendance_v1');
                alert('データを消去しました');
                document.getElementById('historyList').innerHTML = '';
            }
        }
    </script>
</body>

</html>
