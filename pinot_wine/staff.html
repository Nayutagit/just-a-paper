<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINOT STORE Time Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="staff.css">
</head>

<body>

    <div class="clock-container">
        <header class="header">
            <h1>PINOT STORE</h1>
            <!-- <p>Staff Attendance</p> -->
            <div id="workingStatus" class="status-board">
                <!-- Active staff icons will appear here -->
            </div>
        </header>

        <div class="current-time" id="clock">--:--:--</div>
        <div class="current-date" id="date">----/--/--</div>

        <div class="staff-selector">
            <label for="staffName">Staff Name</label>
            <select id="staffName">
                <option value="" disabled selected>名前を選択してください</option>
                <option value="なゆた">なゆた</option>
                <option value="よういちろう">よういちろう</option>
                <option value="まなみん">まなみん</option>
                <option value="あき">あき</option>
                <option value="はやと">はやと</option>
                <option value="ひとみ">ひとみ</option>
                <option value="ケンケン">ケンケン</option>
                <option value="りゅうくん">りゅうくん</option>
                <option value="まみ">まみ</option>
            </select>
        </div>

        <div class="action-grid" style="grid-template-columns: 1fr 1fr;">
            <button class="action-btn in" onclick="recordTime('出勤')">
                <span class="icon">☀️</span>
                <span class="label">出勤</span>
                <span class="sub">Clock In</span>
            </button>
            <button class="action-btn out" onclick="recordTime('退勤')">
                <span class="icon">🌙</span>
                <span class="label">退勤</span>
                <span class="sub">Clock Out</span>
            </button>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <div class="settings-area">
            <details>
                <summary>Manager Menu (管理者メニュー)</summary>
                <div class="input-group">
                    <button onclick="showMonthlyReport()" class="save-btn" style="background: #8e44ad;">Monthly Report
                        (月間集計)</button>
                    <button onclick="downloadCSV()" class="save-btn"
                        style="background: #27ae60; margin-top:10px;">Download CSV (Excel)</button>
                    <button onclick="openEditor()" class="save-btn" style="background: #2980b9; margin-top:10px;">Edit
                        Records (修正・管理)</button>
                    <button onclick="clearData()" class="save-btn" style="background: #c0392b; margin-top:10px;">Clear
                        Data (全消去)</button>
                </div>
            </details>
        </div>
    </div>

    <!-- Monthly Report Modal -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>月間勤務集計</h2>
                <button onclick="closeReport()" style="background:none; border:none; font-size:1.5rem;">&times;</button>
            </div>
            <div class="input-group" style="flex-direction:row; align-items:center; margin-bottom:15px;">
                <input type="month" id="reportMonth" onchange="renderReport()" style="font-size:1rem;">
            </div>
            <div id="reportContainer" class="editor-container">
                <!-- Report will be injected here -->
            </div>
        </div>
    </div>

    <!-- Editor Modal -->
    <div id="editorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>勤怠管理・修正</h2>
                <button onclick="closeEditor()" style="background:none; border:none; font-size:1.5rem;">&times;</button>
            </div>

            <div id="editorList" class="editor-container">
                <!-- Rows will be injected here -->
            </div>

            <div style="display:flex; justify-content: flex-end; gap: 10px;">
                <button onclick="closeEditor()" class="btn-close">Cancel</button>
                <button onclick="saveAllChanges()" class="btn-save">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // Clock Update
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP');
            document.getElementById('date').textContent = now.toLocaleDateString('ja-JP', { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateStatusBoard();
            // Set default month for report
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            document.getElementById('reportMonth').value = `${yyyy}-${mm}`;
        });

        // --- Core Logic ---

        function getData() {
            return JSON.parse(localStorage.getItem('pinot_attendance_v1') || '[]');
        }

        function saveData(data) {
            localStorage.setItem('pinot_attendance_v1', JSON.stringify(data));
            updateStatusBoard();
        }

        // Record Time Function
        function recordTime(action) {
            const staffName = document.getElementById('staffName').value;
            const statusDiv = document.getElementById('statusMessage');

            if (!staffName) {
                statusDiv.textContent = '❌ 名前を選択してください';
                statusDiv.className = 'status-message error';
                return;
            }

            const now = new Date();
            const record = {
                id: Date.now(),
                // Standardize Internal ID
                timestamp: now.toISOString(),
                // Display/ CSV friendly formats
                date: now.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-'),
                time: now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }),
                staff: staffName,
                action: action
            };

            const data = getData();
            data.push(record);
            saveData(data);

            const emoji = action === '出勤' ? '☀️' : '🌙';
            statusDiv.innerHTML = `✅ <strong>${record.time}</strong><br>${staffName}: ${action} 完了しました ${emoji}`;
            statusDiv.className = 'status-message success';
        }

        // Status Board Logic
        function updateStatusBoard() {
            const data = getData();
            // Sort Chronologically
            data.sort((a, b) => a.id - b.id);

            const statusMap = {}; // { StaffName: 'in' | 'out' }

            data.forEach(row => {
                if (row.action === '出勤') statusMap[row.staff] = 'in';
                if (row.action === '退勤') statusMap[row.staff] = 'out';
            });

            const board = document.getElementById('workingStatus');
            board.innerHTML = '';

            let activeCount = 0;
            for (const [staff, status] of Object.entries(statusMap)) {
                if (status === 'in') {
                    const badge = document.createElement('span');
                    badge.className = 'status-badge in';
                    badge.textContent = staff;
                    board.appendChild(badge);
                    activeCount++;
                }
            }

            if (activeCount === 0) {
                board.innerHTML = '<span class="status-placeholder">誰も出勤していません</span>';
            }
        }

        // --- Reporting Logic ---

        function showMonthlyReport() {
            document.getElementById('reportModal').classList.add('active');
            renderReport();
        }

        function closeReport() {
            document.getElementById('reportModal').classList.remove('active');
        }

        function renderReport() {
            const monthInput = document.getElementById('reportMonth').value; // YYYY-MM
            if (!monthInput) return;

            const [year, month] = monthInput.split('-');
            const container = document.getElementById('reportContainer');
            container.innerHTML = '';

            const data = getData();
            // Sort by time roughly
            data.sort((a, b) => a.id - b.id);

            // Filter by selected month
            const filtered = data.filter(row => {
                // row.date is YYYY-MM-DD
                return row.date.startsWith(`${year}-${month}`);
            });

            // Group by Staff
            const staffRecords = {};
            filtered.forEach(row => {
                if (!staffRecords[row.staff]) staffRecords[row.staff] = [];
                staffRecords[row.staff].push(row);
            });

            // Calculate Totals
            let html = '<table class="report-table"><thead><tr><th>Name</th><th>Total Hours</th></tr></thead><tbody>';
            let hasData = false;

            for (const staff of Object.keys(staffRecords)) {
                const records = staffRecords[staff];
                const totalMinutes = calculateMinutes(records);
                const hours = Math.floor(totalMinutes / 60);
                const minutes = totalMinutes % 60;

                html += `
                    <tr>
                        <td><strong>${staff}</strong></td>
                        <td>${hours}時間 ${minutes}分</td>
                    </tr>
                `;
                hasData = true;
            }

            html += '</tbody></table>';

            if (!hasData) {
                container.innerHTML = '<p style="text-align:center; padding:20px;">データがありません</p>';
            } else {
                container.innerHTML = html;
            }
        }

        function calculateMinutes(records) {
            // records is sorted by time for one staff in one month
            // We assume pairs of In -> Out.
            // If multiple 'In's occur without 'Out', we ignore the earlier 'In's or treat as user error.
            // Let's iterate linearly.

            let totalMinutes = 0;
            let lastInTime = null;

            records.forEach(row => {
                const dt = new Date(`${row.date.replace(/-/g, '/')} ${row.time}`); // Date Object

                if (row.action === '出勤') {
                    lastInTime = dt;
                } else if (row.action === '退勤') {
                    if (lastInTime) {
                        const diff = (dt - lastInTime) / 1000 / 60; // minutes
                        if (diff > 0) totalMinutes += diff;
                        lastInTime = null; // Reset
                    }
                }
            });

            return Math.floor(totalMinutes);
        }

        // --- Manager / Editor Logic ---

        // Export to CSV
        function downloadCSV() {
            let data = getData();
            if (data.length === 0) { alert('データがありません'); return; }

            // Sort Chronologically
            data.sort((a, b) => {
                const dateA = a.date.replace(/\//g, '-') + ' ' + a.time;
                const dateB = b.date.replace(/\//g, '-') + ' ' + b.time;
                return new Date(dateA) - new Date(dateB);
            });

            // CSV Header
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Date,Time,Staff,Action\n";

            // CSV Body
            data.forEach(row => {
                const dateFixed = row.date.replace(/-/g, '/');
                csvContent += `${dateFixed},${row.time},${row.staff},${row.action}\n`;
            });

            // Download Link
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            const dateStr = new Date().toISOString().slice(0, 10);
            link.setAttribute("download", `pinot_attendance_${dateStr}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        let editingData = [];

        function openEditor() {
            editingData = getData();
            renderEditor();
            document.getElementById('editorModal').classList.add('active');
        }

        function closeEditor() {
            document.getElementById('editorModal').classList.remove('active');
        }

        function renderEditor() {
            const container = document.getElementById('editorList');
            container.innerHTML = '';

            // Sort by Date Descending (Newest first) for Editor
            editingData.sort((a, b) => {
                const dateA = a.date.replace(/\//g, '-') + ' ' + a.time;
                const dateB = b.date.replace(/\//g, '-') + ' ' + b.time;
                return new Date(dateB) - new Date(dateA);
            });

            editingData.forEach((row, index) => {
                const div = document.createElement('div');
                div.className = 'edit-row';
                const dateValue = row.date.replace(/\//g, '-');

                div.innerHTML = `
                    <input type="date" class="edit-date" value="${dateValue}" onchange="updateRow(${index}, 'date', this.value)">
                    <input type="time" class="edit-time" value="${row.time}" onchange="updateRow(${index}, 'time', this.value)">
                    <select class="edit-staff" onchange="updateRow(${index}, 'staff', this.value)">
                        ${getStaffOptions(row.staff)}
                    </select>
                    <select class="edit-action" onchange="updateRow(${index}, 'action', this.value)">
                        <option value="出勤" ${row.action === '出勤' ? 'selected' : ''}>出勤</option>
                        <option value="退勤" ${row.action === '退勤' ? 'selected' : ''}>退勤</option>
                    </select>
                    <button class="btn-delete" onclick="deleteRow(${index})">🗑</button>
                `;
                container.appendChild(div);
            });
        }

        function getStaffOptions(selectedName) {
            const staffs = ["なゆた", "よういちろう", "まなみん", "あき", "はやと", "ひとみ", "ケンケン", "りゅうくん", "まみ"];
            return staffs.map(name =>
                `<option value="${name}" ${name === selectedName ? 'selected' : ''}>${name}</option>`
            ).join('');
        }

        function updateRow(index, field, value) {
            editingData[index][field] = value;
        }

        function deleteRow(index) {
            if (confirm('削除しますか？')) {
                editingData.splice(index, 1);
                renderEditor();
            }
        }

        function saveAllChanges() {
            saveData(editingData);
            alert('修正を保存しました！');
            closeEditor();
        }

        // Clear Data
        function clearData() {
            if (confirm('全てのデータを消去しますか？\n(CSVバックアップを取ってから行うことを推奨します)')) {
                localStorage.removeItem('pinot_attendance_v1');
                alert('データを消去しました');
                updateStatusBoard();
            }
        }
    </script>
</body>

</html>
