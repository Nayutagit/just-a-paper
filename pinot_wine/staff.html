<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinot Staff Time Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="staff.css">
</head>

<body>

    <div class="clock-container">
        <header class="header">
            <h1>PINOT WINE</h1>
            <p>Staff Attendance</p>
        </header>

        <div class="current-time" id="clock">--:--:--</div>
        <div class="current-date" id="date">----/--/--</div>

        <div class="staff-selector">
            <label for="staffName">Staff Name</label>
            <select id="staffName">
                <option value="" disabled selected>名前を選択してください</option>
                <option value="なゆた">なゆた</option>
                <option value="よういちろう">よういちろう</option>
                <option value="まなみん">まなみん</option>
                <option value="あき">あき</option>
                <option value="はやと">はやと</option>
                <option value="ひとみ">ひとみ</option>
                <option value="ケンケン">ケンケン</option>
                <option value="りゅうくん">りゅうくん</option>
            </select>
        </div>

        <div class="action-grid">
            <button class="action-btn in" onclick="recordTime('出勤')">
                <span class="icon">☀️</span>
                <span class="label">出勤</span>
                <span class="sub">Clock In</span>
            </button>
            <button class="action-btn out" onclick="recordTime('退勤')">
                <span class="icon">🌙</span>
                <span class="label">退勤</span>
                <span class="sub">Clock Out</span>
            </button>
            <button class="action-btn break" onclick="recordTime('休憩入')">
                <span class="icon">☕️</span>
                <span class="label">休憩入り</span>
            </button>
            <button class="action-btn break" onclick="recordTime('休憩戻')">
                <span class="icon">🔙</span>
                <span class="label">休憩戻り</span>
            </button>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <div class="settings-area">
            <details>
                <summary>Manager Menu (管理者メニュー)</summary>
                <div class="input-group">
                    <button onclick="downloadCSV()" class="save-btn" style="background: #27ae60;">Download CSV
                        (Excel)</button>
                    <button onclick="openEditor()" class="save-btn" style="background: #2980b9; margin-top:10px;">Edit
                        Records (修正・管理)</button>
                    <button onclick="clearData()" class="save-btn" style="background: #c0392b; margin-top:10px;">Clear
                        Data (全消去)</button>
                </div>
            </details>
        </div>
    </div>

    <!-- Editor Modal -->
    <div id="editorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>勤怠管理・修正</h2>
                <button onclick="closeEditor()" style="background:none; border:none; font-size:1.5rem;">&times;</button>
            </div>

            <div id="editorList" class="editor-container">
                <!-- Rows will be injected here -->
            </div>

            <div style="display:flex; justify-content: flex-end; gap: 10px;">
                <button onclick="closeEditor()" class="btn-close">Cancel</button>
                <button onclick="saveAllChanges()" class="btn-save">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // Clock Update
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP');
            document.getElementById('date').textContent = now.toLocaleDateString('ja-JP', { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Record Time Function (Local Storage)
        function recordTime(action) {
            const staffName = document.getElementById('staffName').value;
            const statusDiv = document.getElementById('statusMessage');

            if (!staffName) {
                statusDiv.textContent = '❌ 名前を選択してください';
                statusDiv.className = 'status-message error';
                return;
            }

            const now = new Date();
            const record = {
                id: Date.now(),
                timestamp: now.toISOString(),
                // Store standard format YYYY-MM-DD for consistency
                date: now.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-'),
                time: now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }),
                staff: staffName,
                action: action
            };

            // Save to LocalStorage
            let data = JSON.parse(localStorage.getItem('pinot_attendance_v1') || '[]');
            data.push(record);
            localStorage.setItem('pinot_attendance_v1', JSON.stringify(data));

            // Feedback
            statusDiv.innerHTML = `✅ <strong>${record.time}</strong><br>${staffName}: ${action} 記録しました`;
            statusDiv.className = 'status-message success';
        }

        // Helper: Sort by Date+Time
        function sortRecords(data) {
            return data.sort((a, b) => {
                const dateA = a.date.replace(/\//g, '-') + ' ' + a.time;
                const dateB = b.date.replace(/\//g, '-') + ' ' + b.time;
                return new Date(dateA) - new Date(dateB);
            });
        }

        // Export to CSV
        function downloadCSV() {
            let data = JSON.parse(localStorage.getItem('pinot_attendance_v1') || '[]');
            if (data.length === 0) {
                alert('データがありません');
                return;
            }

            // Sort Chronologically
            data = sortRecords(data);

            // CSV Header
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Date,Time,Staff,Action\n";

            // CSV Body
            data.forEach(row => {
                // Ensure date format is YYYY/MM/DD for Excel
                const dateFixed = row.date.replace(/-/g, '/');
                csvContent += `${dateFixed},${row.time},${row.staff},${row.action}\n`;
            });

            // Download Link
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            const dateStr = new Date().toISOString().slice(0, 10);
            link.setAttribute("download", `pinot_attendance_${dateStr}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- Editor Logic ---
        let editingData = [];

        function openEditor() {
            editingData = JSON.parse(localStorage.getItem('pinot_attendance_v1') || '[]');
            renderEditor();
            document.getElementById('editorModal').classList.add('active');
        }

        function closeEditor() {
            document.getElementById('editorModal').classList.remove('active');
        }

        function renderEditor() {
            const container = document.getElementById('editorList');
            container.innerHTML = '';

            // Sort by Date Descending (Newest first) for Editor
            editingData.sort((a, b) => {
                const dateA = a.date.replace(/\//g, '-') + ' ' + a.time;
                const dateB = b.date.replace(/\//g, '-') + ' ' + b.time;
                return new Date(dateB) - new Date(dateA);
            });

            editingData.forEach((row, index) => {
                const div = document.createElement('div');
                div.className = 'edit-row';

                // Normalizing date for input type="date"
                const dateValue = row.date.replace(/\//g, '-');

                div.innerHTML = `
                    <input type="date" class="edit-date" value="${dateValue}" onchange="updateRow(${index}, 'date', this.value)">
                    <input type="time" class="edit-time" value="${row.time}" onchange="updateRow(${index}, 'time', this.value)">
                    <select class="edit-staff" onchange="updateRow(${index}, 'staff', this.value)">
                        ${getStaffOptions(row.staff)}
                    </select>
                    <select class="edit-action" onchange="updateRow(${index}, 'action', this.value)">
                        <option value="出勤" ${row.action === '出勤' ? 'selected' : ''}>出勤</option>
                        <option value="退勤" ${row.action === '退勤' ? 'selected' : ''}>退勤</option>
                        <option value="休憩入" ${row.action === '休憩入' ? 'selected' : ''}>休入</option>
                        <option value="休憩戻" ${row.action === '休憩戻' ? 'selected' : ''}>休戻</option>
                    </select>
                    <button class="btn-delete" onclick="deleteRow(${index})">🗑</button>
                `;
                container.appendChild(div);
            });
        }

        function getStaffOptions(selectedName) {
            const staffs = ["なゆた", "よういちろう", "まなみん", "あき", "はやと", "ひとみ", "ケンケン", "りゅうくん"];
            return staffs.map(name =>
                `<option value="${name}" ${name === selectedName ? 'selected' : ''}>${name}</option>`
            ).join('');
        }

        function updateRow(index, field, value) {
            editingData[index][field] = value;
        }

        function deleteRow(index) {
            if (confirm('削除しますか？')) {
                editingData.splice(index, 1);
                renderEditor();
            }
        }

        function saveAllChanges() {
            localStorage.setItem('pinot_attendance_v1', JSON.stringify(editingData));
            alert('修正を保存しました！');
            closeEditor();
        }

        // Clear Data
        function clearData() {
            if (confirm('全てのデータを消去しますか？\n(CSVバックアップを取ってから行うことを推奨します)')) {
                localStorage.removeItem('pinot_attendance_v1');
                alert('データを消去しました');
                // The historyList element is removed from HTML, so this line is no longer needed.
                // document.getElementById('historyList').innerHTML = ''; 
            }
        }
    </script>
</body>

</html>
